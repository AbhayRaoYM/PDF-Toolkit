{% extends "base.html" %}
{% block title %}Word → PDF{% endblock %}

{% block favicon %}
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232563eb' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/><path d='M9 15l3 3 3-3'/><line x1='12' y1='12' x2='12' y2='18'/></svg>" />
{% endblock %}

{% block content %}
<div class="module-page">
  <div class="page-header">
    <div class="page-header-icon icon-blue"><i data-lucide="file-output"></i></div>
    <div>
      <h1 class="page-title">Word → PDF</h1>
      <p class="page-desc">Upload a <code>.docx</code> file and download it as a PDF.</p>
    </div>
  </div>

  <div class="drop-zone" id="dropZone">
    <div class="drop-icon"><i data-lucide="upload-cloud"></i></div>
    <p class="drop-main">Drag &amp; drop your <strong>.docx</strong> file here</p>
    <p class="drop-or">or</p>
    <label class="btn btn-secondary">
      <i data-lucide="folder-open"></i> Browse file
      <input type="file" id="fileInput" accept=".docx" hidden />
    </label>
    <p class="drop-hint" id="selectedName">No file selected</p>
  </div>

  <button class="btn btn-primary" id="convertBtn" disabled>
    <i data-lucide="file-down"></i> Convert &amp; Download
  </button>

  <div class="status-box" id="statusBox" hidden></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
(function () {
  const dropZone  = document.getElementById("dropZone");
  const fileInput = document.getElementById("fileInput");
  const nameLabel = document.getElementById("selectedName");
  const convertBtn= document.getElementById("convertBtn");
  const statusBox = document.getElementById("statusBox");
  let selectedFile = null;

  function setFile(file) {
    if (!file || !file.name.toLowerCase().endsWith(".docx")) {
      showStatus("Please select a .docx file.", "error"); return;
    }
    selectedFile = file;
    nameLabel.textContent = file.name;
    nameLabel.classList.add("has-file");
    convertBtn.disabled = false;
    hideStatus();
  }

  fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
  dropZone.addEventListener("drop", e => { e.preventDefault(); dropZone.classList.remove("drag-over"); setFile(e.dataTransfer.files[0]); });

  convertBtn.addEventListener("click", async () => {
    if (!selectedFile) return;
    convertBtn.disabled = true;
    showStatus("Converting… please wait.", "info");
    const fd = new FormData();
    fd.append("file", selectedFile);
    try {
      const res = await fetch("/word-to-pdf/convert", { method: "POST", body: fd });
      if (!res.ok) { const err = await res.json(); showStatus(err.error || "Conversion failed.", "error"); convertBtn.disabled = false; return; }
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = selectedFile.name.replace(/\.docx$/i, ".pdf"); a.click();
      URL.revokeObjectURL(url);
      showStatus("Done! Your PDF has been downloaded.", "success");
    } catch (e) { showStatus("Network error. Please try again.", "error"); }
    convertBtn.disabled = false;
  });

  function showStatus(msg, type) { statusBox.textContent = msg; statusBox.className = "status-box status-" + type; statusBox.hidden = false; }
  function hideStatus() { statusBox.hidden = true; }
})();
</script>
{% endblock %}
