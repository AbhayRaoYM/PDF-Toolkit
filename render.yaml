services:
  - type: web
    name: pdf-toolkit
    runtime: python
    buildCommand: sudo apt-get install -y libreoffice --no-install-recommends && pip install -r requirements.txt
    startCommand: gunicorn --workers 2 --timeout 120 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
